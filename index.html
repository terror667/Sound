<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOᑌᘉᗞ | Ultra Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d4ff; --bg-dark: #050a10; --glass: rgba(15, 25, 35, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { width: 100%; height: 100%; background: var(--bg-dark); overflow: hidden; color: white; }

        /* Container que segura as páginas sem recarregar o áudio */
        #content-frame { width: 100%; height: calc(100% - 100px); border: none; }

        /* PLAYER FIXO NO MESTRE */
        .player {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: var(--glass); backdrop-filter: blur(30px);
            padding: 12px 25px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: space-between; z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .track-info { display: flex; align-items: center; gap: 12px; min-width: 180px; }
        #cover { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: #111; }
        .track-text h3 { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }

        .controls { flex: 1; display: flex; flex-direction: column; align-items: center; max-width: 400px; margin: 0 15px; }
        .control-btns { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; }
        .btn-svg { background: transparent; border: none; cursor: pointer; fill: #fff; }
        .play-btn-circle { width: 45px; height: 45px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; fill: #000 !important; }

        .progress-area { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 10px; color: #888; }
        .custom-bar { flex: 1; height: 5px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; cursor: pointer; position: relative; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: var(--primary); }

        .vol-container { display: flex; align-items: center; gap: 8px; width: 120px; }
        .vol-container input { width: 100%; accent-color: var(--primary); cursor: pointer; }

        @media (max-width: 850px) {
            .vol-container { display: none; }
            .player { padding: 10px 15px; bottom: 10px; }
            .track-info { min-width: auto; }
        }
    </style>
</head>
<body>

    <iframe src="pagina1.html" id="content-frame" name="main_frame"></iframe>

    <div class="player">
        <div class="track-info">
            <img id="cover" src="https://via.placeholder.com/50" alt="">
            <div class="track-text">
                <h3 id="now">Aguardando...</h3>
                <p id="status" style="font-size: 11px; color: var(--primary);">SOUND System</p>
            </div>
        </div>

        <div class="controls">
            <div class="control-btns">
                <button class="btn-svg" onclick="prev()"><svg width="20" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="btn-svg play-btn-circle" onclick="toggle()"><svg id="playIcon" width="24" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
                <button class="btn-svg" onclick="next()"><svg width="20" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>
            <div class="progress-area">
                <span id="current">0:00</span>
                <div class="custom-bar" onclick="seek(event)"><div class="fill" id="bar-fill"></div></div>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="vol-container">
            <svg width="18" fill="#fff" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const playlist = [
            {name:"A Promessa", img:"imagens/imagem1.jpg", src:"musicas/musica1.mp3"},
            {name:"Se Hoje Me Tocas", img:"imagens/imagem2.jpg", src:"musicas/musica2.mp3"},
            {name:"Tu Que Habitas no Jardim", img:"imagens/imagem3.jpg", src:"musicas/musica3.mp3"},
            {name:"É ele", img:"imagens/imagem4.jpg", src:"musicas/musica4.mp3"},
            {name:"Yeshua", img:"imagens/imagem5.jpg", src:"musicas/musica5.mp3"},
            {name:"Não mais escravos", img:"imagens/imagem6.jpg", src:"musicas/musica6.mp3"},
            {name:"Me ama", img:"imagens/imagem7.jpg", src:"musicas/musica7.mp3"},
            {name:"Mesmo sem entender", img:"imagens/imagem8.jpg", src:"musicas/musica8.mp3"},
            {name:"Quando o mundo cai ao meu redor", img:"imagens/imagem9.jpg", src:"musicas/musica9.mp3"},
            {name:"Me leva pra casa", img:"imagens/imagem10.jpg", src:"musicas/musica10.mp3"},
            {name:"Uma nova história", img:"imagens/imagem11.jpg", src:"musicas/musica11.mp3"},
            {name:"Nunca foi sobre nós", img:"imagens/imagem12.jpg", src:"musicas/musica12.mp3"},
            {name:"Me ajuda a melhorar", img:"imagens/imagem13.jpg", src:"musicas/musica13.mp3"}
        ];

        let currentIndex = 0;
        const audio = document.getElementById("audio");

        function playMusic(i) {
            currentIndex = i;
            audio.src = playlist[currentIndex].src;
            audio.play();
            document.getElementById("now").innerText = playlist[currentIndex].name;
            document.getElementById("cover").src = playlist[currentIndex].img;
            updateIcon();
        }

        function toggle() { if(audio.src) audio.paused ? audio.play() : audio.pause(); updateIcon(); }
        function updateIcon() { 
            document.getElementById("playIcon").innerHTML = audio.paused ? '<path d="M8 5v14l11-7z"/>' : '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; 
        }
        function next() { currentIndex = (currentIndex + 1) % playlist.length; playMusic(currentIndex); }
        function prev() { currentIndex = (currentIndex - 1 + playlist.length) % playlist.length; playMusic(currentIndex); }
        function setVolume(v) { audio.volume = v; }
        function seek(e) {
            const rect = e.target.closest('.custom-bar').getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        }

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById("bar-fill").style.width = pct + "%";
            document.getElementById("current").innerText = format(audio.currentTime);
            document.getElementById("duration").innerText = isNaN(audio.duration) ? "0:00" : format(audio.duration);
        };

        function format(s) {
            let m = Math.floor(s/60); let sec = Math.floor(s%60);
            return m + ":" + (sec < 10 ? "0"+sec : sec);
        }
        audio.onended = next;

        // Listener para receber comandos das páginas internas
        window.addEventListener('message', (e) => {
            if(e.data.type === 'PLAY') playMusic(e.data.index);
        });
    </script>
</body>
</html>
