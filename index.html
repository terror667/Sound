<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOᑌᘉᗞ</title>

<link rel="icon" type="image/png" href="logo.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  display: flex;
  min-height: 100vh;
  background: linear-gradient(180deg, #0b1d26, #000);
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 230px;
  background: rgba(0,0,0,0.9);
  padding: 25px;
}

/* LOGO SIDEBAR */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:#00d4ff;
  font-weight:bold;
  font-size:18px;
}

.logo img{
  width:35px;
  height:35px;
  object-fit:contain;
  border-radius:8px;
}

/* MAIN */
.main {
  flex: 1;
  padding: 30px;
  padding-bottom: 170px;
}

.header {
  font-size: 28px;
  margin-bottom: 25px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  text-align: center;
  cursor: pointer;
}

.img-box {
  width: 100%;
  aspect-ratio: 1/1;
  background: linear-gradient(145deg, #0a0a0a, #111);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: 0.3s;
}

.img-box img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.card:hover .img-box {
  transform: translateY(-6px);
  box-shadow: 0 15px 30px rgba(0,212,255,0.25);
}

.card h4 {
  margin-top: 10px;
  font-size: 13px;
  color: #ccc;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 0;
  left: 230px;
  right: 0;
  background: rgba(10,10,10,0.97);
  padding: 15px;
  border-top: 1px solid #00d4ff33;
}

.player-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

#cover {
  width: 55px;
  height: 55px;
  border-radius: 10px;
  object-fit: contain;
  background: #111;
}

#now {
  color: #00d4ff;
  font-size: 14px;
}

/* CONTROLS */
.controls {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 10px;
}

button {
  background: #111;
  border: 1px solid #00d4ff55;
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #00d4ff22;
}

/* BARRA */
.progress {
  width: 100%;
  margin-top: 10px;
}

/* INFO */
.info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #aaa;
  margin-top: 5px;
}

/* VOLUME */
.volume {
  width: 120px;
}

/* MOBILE */
@media (max-width: 768px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; text-align: center; }
  .grid { grid-template-columns: repeat(2, 1fr); }
  .player { left: 0; }
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">
    <span>SOᑌᘉᗞ 🎧</span>
  </div>
</div>

<div class="main">

  <div class="header">Vibe do momento</div>

  <div class="grid">

    <div class="card" onclick="playMusic(0)">
      <div class="img-box"><img src="imagens/imagem1.jpg"></div>
      <h4>A Promessa</h4>
    </div>

    <div class="card" onclick="playMusic(1)">
      <div class="img-box"><img src="imagens/imagem2.jpg"></div>
      <h4>Se Hoje Me Tocas</h4>
    </div>

    <div class="card" onclick="playMusic(2)">
      <div class="img-box"><img src="imagens/imagem3.jpg"></div>
      <h4>Tu Que Habitas no Jardim</h4>
    </div>

    <div class="card" onclick="playMusic(3)">
      <div class="img-box"><img src="imagens/imagem4.jpg"></div>
      <h4>É ele</h4>
    </div>

    <div class="card" onclick="playMusic(4)">
      <div class="img-box"><img src="imagens/imagem5.jpg"></div>
      <h4>Yeshua</h4>
    </div>

    <div class="card" onclick="playMusic(5)">
      <div class="img-box"><img src="imagens/imagem6.jpg"></div>
      <h4>Não mais escravos</h4>
    </div>

    <div class="card" onclick="playMusic(6)">
      <div class="img-box"><img src="imagens/imagem7.jpg"></div>
      <h4>Me ama</h4>
    </div>

    <div class="card" onclick="playMusic(7)">
      <div class="img-box"><img src="imagens/imagem8.jpg"></div>
      <h4>Mesmo sem entender</h4>
    </div>

    <div class="card" onclick="playMusic(8)">
      <div class="img-box"><img src="imagens/imagem9.jpg"></div>
      <h4>Quando o mundo cai</h4>
    </div>

    <div class="card" onclick="playMusic(9)">
      <div class="img-box"><img src="imagens/imagem10.jpg"></div>
      <h4>Me leva pra casa</h4>
    </div>

    <div class="card" onclick="playMusic(10)">
      <div class="img-box"><img src="imagens/imagem11.jpg"></div>
      <h4>Uma nova história</h4>
    </div>

    <div class="card" onclick="playMusic(11)">
      <div class="img-box"><img src="imagens/imagem12.jpg"></div>
      <h4>Nunca foi sobre nós</h4>
    </div>

    <div class="card" onclick="playMusic(12)">
      <div class="img-box"><img src="imagens/imagem13.jpg"></div>
      <h4>Me ajuda a melhorar</h4>
    </div>

  </div>
</div>

<!-- PLAYER -->
<div class="player">

  <div class="player-top">
    <img id="cover">
    <div>
      <div id="now"></div>
      <input type="range" class="volume" min="0" max="1" step="0.01" onchange="setVolume(this.value)">
    </div>
  </div>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()" id="playBtn">▶</button>
    <button onclick="next()">⏭</button>
  </div>

  <input type="range" id="progress" class="progress">

  <div class="info">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <audio id="audio"></audio>
</div>

<script>

const audio = document.getElementById("audio");
const now = document.getElementById("now");
const cover = document.getElementById("cover");
const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

let playlist = [
  {src:"musicas/musica1.mp3", name:"A Promessa", img:"imagens/imagem1.jpg"},
  {src:"musicas/musica2.mp3", name:"Se Hoje Me Tocas", img:"imagens/imagem2.jpg"},
  {src:"musicas/musica3.mp3", name:"Tu Que Habitas no Jardim", img:"imagens/imagem3.jpg"},
  {src:"musicas/musica4.mp3", name:"É ele", img:"imagens/imagem4.jpg"},
  {src:"musicas/musica5.mp3", name:"Yeshua", img:"imagens/imagem5.jpg"},
  {src:"musicas/musica6.mp3", name:"Não mais escravos", img:"imagens/imagem6.jpg"},
  {src:"musicas/musica7.mp3", name:"Me ama", img:"imagens/imagem7.jpg"},
  {src:"musicas/musica8.mp3", name:"Mesmo sem entender", img:"imagens/imagem8.jpg"},
  {src:"musicas/musica9.mp3", name:"Quando o mundo cai", img:"imagens/imagem9.jpg"},
  {src:"musicas/musica10.mp3", name:"Me leva pra casa", img:"imagens/imagem10.jpg"},
  {src:"musicas/musica11.mp3", name:"Uma nova história", img:"imagens/imagem11.jpg"},
  {src:"musicas/musica12.mp3", name:"Nunca foi sobre nós", img:"imagens/imagem12.jpg"},
  {src:"musicas/musica13.mp3", name:"Me ajuda a melhorar", img:"imagens/imagem13.jpg"}
];

let index = 0;
let started = false;

function playMusic(i){
  index = i;
  let m = playlist[index];
  audio.src = m.src;
  audio.play();

  now.innerText = m.name;
  cover.src = m.img;
  started = true;
}

function next(){
  index = (index + 1) % playlist.length;
  playMusic(index);
}

function prev(){
  index = (index - 1 + playlist.length) % playlist.length;
  playMusic(index);
}

function toggle(){
  if(!started) return;
  audio.paused ? audio.play() : audio.pause();
}

function setVolume(v){
  audio.volume = v;
}

audio.addEventListener("timeupdate", () => {
  progress.value = (audio.currentTime / audio.duration) * 100 || 0;
  current.innerText = format(audio.currentTime);
  duration.innerText = format(audio.duration);
});

progress.addEventListener("input", () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
});

function format(s){
  let m = Math.floor(s / 60) || 0;
  let sec = Math.floor(s % 60) || 0;
  return m + ":" + (sec < 10 ? "0"+sec : sec);
}

audio.addEventListener("ended", () => {
  next();
});

</script>

</body>
</html>
