<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOᑌᘉᗞ | Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --bg-dark: #050a0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass: rgba(10, 20, 30, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #0b1d26, var(--bg-dark));
            color: white;
            overflow-x: hidden;
        }

        /* SIDEBAR MODERNA */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            color: #888;
            margin-bottom: 5px;
        }

        .nav-links li:hover, .nav-links li.active {
            background: var(--card-bg);
            color: var(--primary);
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            height: 100vh;
            padding-bottom: 120px;
        }

        .header {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* GRID DE CARDS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .card:hover .img-box img {
            transform: scale(1.1);
        }

        .card h4 {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* PLAYER FLUTUANTE */
        .player {
            position: fixed;
            bottom: 20px;
            left: 280px;
            right: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 30%;
        }

        #cover {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            background: #111;
        }

        .track-details h3 { font-size: 14px; margin-bottom: 4px; }
        .track-details p { font-size: 12px; color: var(--primary); }

        .player-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btns {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-control {
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-control:hover { color: var(--primary); transform: scale(1.1); }

        .btn-play {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
        }

        /* PROGRESS BAR CUSTOM */
        .progress-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: #666;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .volume-container {
            width: 20%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .player { left: 10px; right: 10px; bottom: 10px; }
            .volume-container { display: none; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">SOᑌᘉᗞ 🎧</div>
    <ul class="nav-links">
        <li class="active">Explorar</li>
        <li>Favoritas</li>
        <li>Playlists</li>
        <li>Configurações</li>
    </ul>
</aside>

<main class="main">
    <div class="header">
        <span>Vibe do momento</span>
        <a href="pagina2.html" style="color: var(--primary); text-decoration: none; font-size: 14px;">Ver tudo</a>
    </div>

    <div class="grid" id="music-grid">
        </div>
</main>

<div class="player">
    <div class="player-info">
        <img id="cover" src="https://via.placeholder.com/60" alt="Capa">
        <div class="track-details">
            <h3 id="now">Selecione uma música</h3>
            <p id="artist">Artista</p>
        </div>
    </div>

    <div class="player-controls">
        <div class="btns">
            <button class="btn-control" onclick="prev()">⏮</button>
            <button class="btn-control btn-play" onclick="toggle()" id="playBtn">▶</button>
            <button class="btn-control" onclick="next()">⏭</button>
        </div>
        <div class="progress-container">
            <span id="current">0:00</span>
            <input type="range" id="progress" value="0">
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="volume-container">
        <span>🔊</span>
        <input type="range" min="0" max="1" step="0.01" oninput="setVolume(this.value)" style="width: 80px;">
    </div>

    <audio id="audio"></audio>
</div>

<script>
    const playlist = [
        {name: "A Promessa", img: "imagens/imagem1.jpg", src: "musicas/musica1.mp3"},
        {name: "Se Hoje Me Tocas", img: "imagens/imagem2.jpg", src: "musicas/musica2.mp3"},
        {name: "Tu Que Habitas no Jardim", img: "imagens/imagem3.jpg", src: "musicas/musica3.mp3"},
        {name: "É ele", img: "imagens/imagem4.jpg", src: "musicas/musica4.mp3"},
        {name: "Yeshua", img: "imagens/imagem5.jpg", src: "musicas/musica5.mp3"},
        {name: "Não mais escravos", img: "imagens/imagem6.jpg", src: "musicas/musica6.mp3"},
        {name: "Me ama", img: "imagens/imagem7.jpg", src: "musicas/musica7.mp3"},
        {name: "Mesmo sem entender", img: "imagens/imagem8.jpg", src: "musicas/musica8.mp3"},
        {name: "Quando o mundo cai ao meu redor", img: "imagens/imagem9.jpg", src: "musicas/musica9.mp3"},
        {name: "Me leva pra casa", img: "imagens/imagem10.jpg", src: "musicas/musica10.mp3"},
        {name: "Uma nova história", img: "imagens/imagem11.jpg", src: "musicas/musica11.mp3"},
        {name: "Nunca foi sobre nós", img: "imagens/imagem12.jpg", src: "musicas/musica12.mp3"},
        {name: "Me ajuda a melhorar", img: "imagens/imagem13.jpg", src: "musicas/musica13.mp3"}
    ];

    const grid = document.getElementById('music-grid');
    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    let currentIndex = 0;
    let isPlaying = false;

    // Renderizar Cards
    playlist.forEach((music, i) => {
        grid.innerHTML += `
            <div class="card" onclick="playMusic(${i})">
                <div class="img-box">
                    <img src="${music.img}" onerror="this.src='https://via.placeholder.com/180/111/00d4ff?text=SOUND'">
                </div>
                <h4>${music.name}</h4>
            </div>
        `;
    });

    function playMusic(i) {
        currentIndex = i;
        const m = playlist[currentIndex];
        audio.src = m.src;
        audio.play();
        
        document.getElementById("now").innerText = m.name;
        document.getElementById("cover").src = m.img;
        isPlaying = true;
        updatePlayBtn();
    }

    function toggle() {
        if (!audio.src) return;
        if (audio.paused) {
            audio.play();
            isPlaying = true;
        } else {
            audio.pause();
            isPlaying = false;
        }
        updatePlayBtn();
    }

    function updatePlayBtn() {
        playBtn.innerHTML = isPlaying ? "⏸" : "▶";
    }

    function next() {
        currentIndex = (currentIndex + 1) % playlist.length;
        playMusic(currentIndex);
    }

    function prev() {
        currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
        playMusic(currentIndex);
    }

    function setVolume(v) { audio.volume = v; }

    audio.addEventListener("timeupdate", () => {
        const progress = document.getElementById("progress");
        progress.value = (audio.currentTime / audio.duration) * 100 || 0;
        document.getElementById("current").innerText = format(audio.currentTime);
        document.getElementById("duration").innerText = format(audio.duration);
    });

    function format(s) {
        let m = Math.floor(s / 60) || 0;
        let sec = Math.floor(s % 60) || 0;
        return m + ":" + (sec < 10 ? "0" + sec : sec);
    }

    audio.addEventListener("ended", next);
</script>

</body>
</html>
