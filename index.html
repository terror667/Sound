<style>
/* Variáveis CSS */
:root {
  --primary: #00d4ff;
  --bg-dark: #050a10;
  --glass: rgba(15, 25, 35, 0.98);
  --glass-border: rgba(255, 255, 255, 0.1);
  --text-light: #f0f0f0;
  --text-muted: #888;
  --button-hover: rgba(255, 255, 255, 0.1);
}

/* Reset Básico e Fontes */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  width: 100%;
  min-height: 100vh;
  background: var(--bg-dark);
  color: var(--text-light);
  display: flex;
  flex-direction: column;
  position: relative; /* Para o player fixed */
}

/* Layout Principal */
main {
  flex-grow: 1; /* Permite que o conteúdo principal ocupe o espaço restante */
  padding: 20px;
  padding-bottom: 120px; /* Espaço para o player fixo */
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

/* Cabeçalho */
header {
  background: var(--glass);
  backdrop-filter: blur(10px);
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--glass-border);
  position: sticky;
  top: 0;
  z-index: 1000;
}

header h1 {
  font-size: 24px;
  color: var(--primary);
  text-shadow: 0 0 8px var(--primary);
}

.logout-btn {
  background: none;
  border: 1px solid var(--primary);
  color: var(--primary);
  padding: 8px 15px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
}

.logout-btn:hover {
  background: var(--primary);
  color: var(--bg-dark);
  box-shadow: 0 0 10px var(--primary);
}

/* Seção de Conteúdo Principal (anteriormente iframe 'pagina1.html') */
#main-content {
  background: rgba(0, 0, 0, 0.3);
  padding: 30px;
  border-radius: 15px;
  margin-top: 30px;
  line-height: 1.6;
}

#main-content h2 {
  color: var(--primary);
  margin-bottom: 20px;
  font-size: 2em;
}

#main-content p {
  margin-bottom: 15px;
  color: var(--text-light);
}

/* Player de Música */
.player {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: var(--glass);
  backdrop-filter: blur(30px);
  padding: 15px 30px;
  border-radius: 30px;
  border: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 9999;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  flex-wrap: wrap; /* Permite que os itens quebrem para a próxima linha em telas pequenas */
  gap: 15px; /* Espaçamento entre os elementos do player */
}

.track-info {
  display: flex;
  align-items: center;
  gap: 15px;
  min-width: 180px; /* Ajuste para telas pequenas */
  flex-basis: 30%; /* Ocupa 30% da largura em telas maiores */
  flex-grow: 1; /* Permite crescimento */
}

#cover {
  width: 60px; /* Aumentado para melhor visualização */
  height: 60px; /* Aumentado para melhor visualização */
  border-radius: 12px;
  object-fit: cover;
  background: #111;
  box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
}

.track-text h3 {
  font-size: 16px; /* Aumentado */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px; /* Ajustado */
  color: var(--text-light);
}

.track-text p {
  font-size: 12px; /* Aumentado */
  color: var(--primary);
  font-weight: 600;
}

.controls {
  flex: 1; /* Ocupa o espaço restante */
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 500px;
  margin: 0 20px;
  min-width: 280px; /* Mínimo para os controles */
}

.control-btns {
  display: flex;
  align-items: center;
  gap: 25px;
  margin-bottom: 10px;
}

.btn-svg {
  background: transparent;
  border: none;
  cursor: pointer;
  fill: var(--text-light);
  display: flex;
  align-items: center;
  font-size: 24px; /* Tamanho dos ícones */
  transition: transform 0.2s ease, color 0.2s ease;
  color: var(--text-light); /* Para emojis como botões */
}

.btn-svg:hover {
  transform: scale(1.1);
  color: var(--primary);
}

.play-btn-circle {
  width: 55px; /* Aumentado */
  height: 55px; /* Aumentado */
  background: var(--primary);
  border-radius: 50%;
  fill: var(--bg-dark) !important;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px; /* Tamanho do ícone de play/pause */
  color: var(--bg-dark); /* Para emojis */
  transition: background 0.3s ease, transform 0.2s ease;
}

.play-btn-circle:hover {
  background: #fff;
  transform: scale(1.05);
}

.progress-area {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  color: var(--text-muted);
}

.custom-bar {
  flex: 1;
  height: 6px;
  background: var(--glass-border);
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.fill {
  width: 0%;
  height: 100%;
  background: var(--primary);
  transition: width 0.1s linear; /* Animação suave para o preenchimento */
}

/* Seção de Contato (EmailJS) */
.contact-section {
    background: rgba(0, 0, 0, 0.3);
    padding: 30px;
    border-radius: 15px;
    margin-top: 30px;
    max-width: 600px; /* Limita a largura do formulário */
    margin-left: auto;
    margin-right: auto;
}

.contact-section h2 {
    color: var(--primary);
    margin-bottom: 25px;
    text-align: center;
    font-size: 2em;
}

.contact-form label {
    display: block;
    margin-bottom: 8px;
    color: var(--text-light);
    font-weight: 600;
}

.contact-form input[type="text"],
.contact-form input[type="email"],
.contact-form textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    background-color: rgba(255, 255, 255, 0.05);
    color: var(--text-light);
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

.contact-form input[type="text"]:focus,
.contact-form input[type="email"]:focus,
.contact-form textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary);
}

.contact-form textarea {
    resize: vertical;
    min-height: 120px;
}

.contact-form button[type="submit"] {
    background: var(--primary);
    color: var(--bg-dark);
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 800;
    width: 100%;
    transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
}

.contact-form button[type="submit"]:hover {
    background: #fff;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
}

.form-message {
    margin-top: 15px;
    text-align: center;
    font-weight: 600;
}

.form-message.success {
    color: #4CAF50; /* Verde para sucesso */
}

.form-message.error {
    color: #f44336; /* Vermelho para erro */
}


/* Rodapé */
footer {
  text-align: center;
  padding: 25px;
  margin-top: 50px;
  color: var(--text-muted);
  font-size: 14px;
  border-top: 1px solid var(--glass-border);
}


/* Media Queries para Responsividade */
@media (max-width: 768px) {
  .player {
    flex-direction: column;
    align-items: center;
    padding: 15px 15px;
    bottom: 10px;
    left: 10px;
    right: 10px;
    border-radius: 20px;
  }

  .track-info {
    width: 100%;
    justify-content: center;
    margin-bottom: 10px;
  }

  .track-text h3 {
    max-width: 200px;
  }

  .controls {
    width: 100%;
    margin: 0;
  }

  .control-btns {
    gap: 20px;
  }

  .logout-btn {
    padding: 6px 12px;
    font-size: 13px;
  }

  header h1 {
    font-size: 20px;
  }

  main {
      padding: 15px;
      padding-bottom: 100px; /* Ajusta para o player menor */
  }

  #main-content, .contact-section {
      padding: 20px;
  }
}

@media (max-width: 480px) {
  .player {
    padding: 10px;
    bottom: 5px;
    left: 5px;
    right: 5px;
  }

  .track-info {
    flex-direction: column;
    text-align: center;
  }

  #cover {
    width: 50px;
    height: 50px;
  }

  .track-text h3 {
    font-size: 14px;
    max-width: 150px;
  }

  .control-btns {
    gap: 15px;
  }

  .btn-svg {
    font-size: 20px;
  }

  .play-btn-circle {
    width: 45px;
    height: 45px;
    font-size: 24px;
  }

  .progress-area {
    font-size: 10px;
    gap: 8px;
  }
}
</style>
</head>

});

// LOGOUT GLOBAL: Função acessível globalmente para o botão "Sair"
window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  }).catch((error) => {
    console.error("Erro ao fazer logout:", error);
    alert("Erro ao fazer logout. Tente novamente.");
  });
};
</script>
