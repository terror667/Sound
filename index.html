<style>
:root { --primary: #00d4ff; --bg-dark: #050a10; --glass: rgba(15, 25, 35, 0.98); --primary-glow: rgba(0, 212, 255, 0.4); }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body, html { width: 100%; height: 100%; background: var(--bg-dark); overflow: hidden; color: white; }
#content-frame { width: 100%; height: 100%; border: none; padding-bottom: 110px; }
.player { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--glass); backdrop-filter: blur(30px); padding: 15px 30px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: space-between; z-index: 9999; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
</style>

<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYxvghCciuFie4Z8qG0JsELoqMaZuXcoo",
  authDomain: "soundpremiun-6f32c.firebaseapp.com",
  projectId: "soundpremiun-6f32c",
  storageBucket: "soundpremiun-6f32c.firebasestorage.app",
  messagingSenderId: "627077390996",
  appId: "1:627077390996:web:4daa434fbeddfe10f60a81"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// PROTEGE
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// LOGOUT GLOBAL
window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

<!-- BOTÃO SAIR -->
<button onclick="logout()" style="position:fixed;top:20px;right:20px;z-index:99999;">Sair</button>
