<style>
/* Variáveis CSS */
:root {
  --primary: #00d4ff;
  --bg-dark: #050a10;
  --glass: rgba(15, 25, 35, 0.98);
  --glass-border: rgba(255, 255, 255, 0.1);
  --text-light: #f0f0f0;
  --text-muted: #888;
  --button-hover: rgba(255, 255, 255, 0.1);
  --card-bg: rgba(255, 255, 255, 0.05);
  --sidebar-text: #94a3b8;
}

/* Reset Básico e Fontes */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  width: 100%;
  min-height: 100vh;
  /* Fundo de gradiente radial elegante */
  background: radial-gradient(circle at top right, #0d2b3a, var(--bg-dark));
  color: var(--text-light);
  display: flex; /* Para layout de sidebar e main */
  overflow-x: hidden; /* Evita scroll horizontal indesejado */
  position: relative; /* Para o player fixed */
}

/* Esconde o scrollbar em navegadores webkit */
body::-webkit-scrollbar {
    display: none;
}
body {
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
}

/* ----- Layout Geral ----- */
.menu-toggle {
    display: none; /* Escondido por padrão, visível em mobile */
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10001;
    background: transparent;
    border: none;
    cursor: pointer;
}

.ham-box {
    width: 30px;
    height: 24px;
    position: relative;
}

.ham-line {
    width: 100%;
    height: 3px;
    background: #fff;
    position: absolute;
    transition: 0.4s;
    border-radius: 3px;
}

.ham-line:nth-child(1) { top: 0; }
.ham-line:nth-child(2) { top: 10px; }
.ham-line:nth-child(3) { top: 20px; }

.active .ham-line:nth-child(1) { transform: translateY(10px) rotate(45deg); }
.active .ham-line:nth-child(2) { opacity: 0; }
.active .ham-line:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

.sidebar {
  width: 260px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
  padding: 40px 25px;
  border-right: 1px solid rgba(255,255,255,0.05);
  transition: transform 0.4s ease;
  flex-shrink: 0; /* Impede que a sidebar encolha */
  display: flex;
  flex-direction: column;
}

.sidebar h2 {
  text-align: center;
  margin-bottom: 30px;
  color: var(--primary);
  font-size: 28px;
  text-shadow: 0 0 10px var(--primary);
}

.nav-links {
  list-style: none;
  flex-grow: 1; /* Ocupa espaço disponível */
}

.nav-links li {
  padding: 15px;
  border-radius: 12px;
  cursor: pointer;
  color: var(--sidebar-text);
  margin-bottom: 5px;
  transition: background-color 0.3s ease, color 0.3s ease;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
}

.nav-links li:hover:not(.active) {
  background: rgba(255,255,255,0.05);
  color: var(--text-light);
}

.nav-links li.active {
  background: var(--card-bg);
  color: var(--primary);
  box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
}

/* Conteúdo Principal */
main {
  flex-grow: 1; /* Permite que o conteúdo principal ocupe o espaço restante */
  padding: 40px;
  padding-bottom: 120px; /* Espaço para o player fixo */
  overflow-y: auto; /* Scroll para o conteúdo principal */
}

/* Estilo para as seções de conteúdo carregadas dinamicamente */
.content-section {
    background: rgba(0, 0, 0, 0.3);
    padding: 30px;
    border-radius: 15px;
    margin-top: 0; /* Já dentro do main com padding */
    line-height: 1.6;
}

.content-section h1, .content-section h2 {
  color: var(--primary);
  margin-bottom: 25px;
  font-size: 2em;
  text-align: left;
}

.content-section p {
  margin-bottom: 15px;
  color: var(--text-light);
}

/* Grid de Músicas */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card-bg);
  padding: 15px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
  text-align: center;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.1);
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.img-box {
  width: 100%;
  aspect-ratio: 1/1;
  border-radius: 15px;
  overflow: hidden;
  margin-bottom: 10px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}

.img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card h4 {
    font-size: 14px;
    color: var(--text-light);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}


/* ----- Player de Música ----- */
.player {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: var(--glass);
  backdrop-filter: blur(30px);
  padding: 15px 30px;
  border-radius: 30px;
  border: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 9999;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  flex-wrap: wrap; /* Permite que os itens quebrem para a próxima linha em telas pequenas */
  gap: 15px; /* Espaçamento entre os elementos do player */
}

.track-info {
  display: flex;
  align-items: center;
  gap: 15px;
  min-width: 180px; /* Ajuste para telas pequenas */
  flex-basis: 30%; /* Ocupa 30% da largura em telas maiores */
  flex-grow: 1; /* Permite crescimento */
}

#cover {
  width: 60px; /* Aumentado para melhor visualização */
  height: 60px; /* Aumentado para melhor visualização */
  border-radius: 12px;
  object-fit: cover;
  background: #111;
  box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
}

.track-text h3 {
  font-size: 16px; /* Aumentado */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px; /* Ajustado */
  color: var(--text-light);
}

.track-text p {
  font-size: 12px; /* Aumentado */
  color: var(--primary);
  font-weight: 600;
}

.controls {
  flex: 1; /* Ocupa o espaço restante */
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 500px;
  margin: 0 20px;
  min-width: 280px; /* Mínimo para os controles */
}

.control-btns {
  display: flex;
  align-items: center;
  gap: 25px;
  margin-bottom: 10px;
}

.btn-svg {
  background: transparent;
  border: none;
  cursor: pointer;
  fill: var(--text-light);
  display: flex;
  align-items: center;
  font-size: 24px; /* Tamanho dos ícones */
  transition: transform 0.2s ease, color 0.2s ease;
  color: var(--text-light); /* Para emojis como botões */
}

.btn-svg:hover {
  transform: scale(1.1);
  color: var(--primary);
}

.play-btn-circle {
  width: 55px; /* Aumentado */
  height: 55px; /* Aumentado */
  background: var(--primary);
  border-radius: 50%;
  fill: var(--bg-dark) !important;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px; /* Tamanho do ícone de play/pause */
  color: var(--bg-dark); /* Para emojis */
  transition: background 0.3s ease, transform 0.2s ease;
}

.play-btn-circle:hover {
  background: #fff;
  transform: scale(1.05);
}

.progress-area {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  color: var(--text-muted);
}

.custom-bar {
  flex: 1;
  height: 6px;
  background: var(--glass-border);
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.fill {
  width: 0%;
  height: 100%;
  background: var(--primary);
  transition: width 0.1s linear; /* Animação suave para o preenchimento */
}

/* ----- Seção de Contato (EmailJS) ----- */
.contact-section {
    max-width: 600px; /* Limita a largura do formulário */
    margin-left: auto;
    margin-right: auto;
}

.contact-section h2 {
    color: var(--primary);
    margin-bottom: 25px;
    text-align: center;
    font-size: 2em;
}

.contact-form label {
    display: block;
    margin-bottom: 8px;
    color: var(--text-light);
    font-weight: 600;
}

.contact-form input[type="text"],
.contact-form input[type="email"],
.contact-form textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    background-color: rgba(255, 255, 255, 0.05);
    color: var(--text-light);
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

.contact-form input[type="text"]:focus,
.contact-form input[type="email"]:focus,
.contact-form textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary);
}

.contact-form textarea {
    resize: vertical;
    min-height: 120px;
}

.contact-form button[type="submit"] {
    background: var(--primary);
    color: var(--bg-dark);
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 800;
    width: 100%;
    transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
}

.contact-form button[type="submit"]:hover {
    background: #fff;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
}

.form-message {
    margin-top: 15px;
    text-align: center;
    font-weight: 600;
}

.form-message.success {
    color: #4CAF50; /* Verde para sucesso */
}

.form-message.error {
    color: #f44336; /* Vermelho para erro */
}


/* ----- Rodapé ----- */
footer {
  text-align: center;
  padding: 25px;
  margin-top: 50px;
  color: var(--text-muted);
  font-size: 14px;
  border-top: 1px solid var(--glass-border);
}

  .menu-toggle { display: block; }

    position: fixed;
    left: 0;
    top: 0;
    height: 100%;
    z-index: 10000;
    transform: translateX(-100%); /* Escondida por padrão em mobile */
  }
