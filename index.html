<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOᑌᘉᗞ | Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --primary-glow: rgba(0, 212, 255, 0.3);
            --bg-dark: #050a0f;
            --card-bg: rgba(255, 255, 255, 0.06);
            --glass: rgba(13, 25, 35, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #0d2b3a, var(--bg-dark));
            color: white;
            overflow-x: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            padding: 40px 25px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 40px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .nav-links li {
            list-style: none;
            padding: 14px 20px;
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.3s;
            font-weight: 500;
        }

        .nav-links li:hover, .nav-links li.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.02);
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 40px;
            height: 100vh;
            overflow-y: auto;
            padding-bottom: 140px;
        }

        .header {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .card:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-glow);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card h4 {
            font-size: 14px;
            font-weight: 600;
            padding: 0 5px;
            color: #e2e8f0;
        }

        /* PLAYER - O CORAÇÃO DO DESIGN */
        .player {
            position: fixed;
            bottom: 25px;
            left: 285px; /* Distância da sidebar */
            right: 25px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 15px 30px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 9999;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 200px;
        }

        #cover {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .track-text h3 { font-size: 14px; color: #fff; }
        .track-text p { font-size: 12px; color: var(--primary); font-weight: 500; }

        /* CONTROLES ESTILIZADOS */
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 500px;
        }

        .control-btns {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 8px;
        }

        .btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 22px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover { color: var(--primary); transform: scale(1.1); }

        .play-btn {
            width: 50px;
            height: 50px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            font-size: 24px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .play-btn:hover {
            transform: scale(1.05);
            background: var(--primary);
            color: #fff;
        }

        .progress-area {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: #64748b;
        }

        input[type="range"] {
            flex: 1;
            height: 5px;
            accent-color: var(--primary);
            cursor: pointer;
            border-radius: 5px;
        }

        /* MOBILE FIXES */
        @media (max-width: 850px) {
            .sidebar { display: none; }
            .main { padding: 25px; }
            .player {
                left: 15px;
                right: 15px;
                bottom: 15px;
                padding: 12px 20px;
                flex-direction: column;
                gap: 10px;
                height: auto;
            }
            .track-info { min-width: 100%; justify-content: center; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .volume-box { display: none; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">SOᑌᘉᗞ</div>
    <ul class="nav-links">
        <li class="active">🏠 Início</li>
        <li>🔍 Descobrir</li>
        <li>❤️ Favoritas</li>
        <li>📂 Biblioteca</li>
    </ul>
</aside>

<main class="main">
    <div class="header">Vibe do momento</div>
    <div class="grid" id="grid">
        </div>
</main>

<div class="player">
    <div class="track-info">
        <img id="cover" src="https://via.placeholder.com/60/0b1d26/00d4ff?text=..." alt="Capa">
        <div class="track-text">
            <h3 id="now">Aguardando...</h3>
            <p>Playing Now</p>
        </div>
    </div>

    <div class="controls">
        <div class="control-btns">
            <button class="btn" onclick="prev()">⏮</button>
            <button class="btn play-btn" onclick="toggle()" id="playBtn">▶</button>
            <button class="btn" onclick="next()">⏭</button>
        </div>
        <div class="progress-area">
            <span id="current">0:00</span>
            <input type="range" id="progress" value="0">
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="volume-box" style="width: 150px; display: flex; align-items: center; gap: 8px;">
        <span style="font-size: 14px;">🔊</span>
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
    </div>

    <audio id="audio"></audio>
</div>

<script>
    const playlist = [
        {name:"A Promessa", img:"imagens/imagem1.jpg", src:"musicas/musica1.mp3"},
        {name:"Se Hoje Me Tocas", img:"imagens/imagem2.jpg", src:"musicas/musica2.mp3"},
        {name:"Tu Que Habitas no Jardim", img:"imagens/imagem3.jpg", src:"musicas/musica3.mp3"},
        {name:"É ele", img:"imagens/imagem4.jpg", src:"musicas/musica4.mp3"},
        {name:"Yeshua", img:"imagens/imagem5.jpg", src:"musicas/musica5.mp3"},
        {name:"Não mais escravos", img:"imagens/imagem6.jpg", src:"musicas/musica6.mp3"},
        {name:"Me ama", img:"imagens/imagem7.jpg", src:"musicas/musica7.mp3"},
        {name:"Mesmo sem entender", img:"imagens/imagem8.jpg", src:"musicas/musica8.mp3"},
        {name:"Quando o mundo cai ao meu redor", img:"imagens/imagem9.jpg", src:"musicas/musica9.mp3"},
        {name:"Me leva pra casa", img:"imagens/imagem10.jpg", src:"musicas/musica10.mp3"},
        {name:"Uma nova história", img:"imagens/imagem11.jpg", src:"musicas/musica11.mp3"},
        {name:"Nunca foi sobre nós", img:"imagens/imagem12.jpg", src:"musicas/musica12.mp3"},
        {name:"Me ajuda a melhorar", img:"imagens/imagem13.jpg", src:"musicas/musica13.mp3"}
    ];

    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    const grid = document.getElementById("grid");
    let currentIndex = 0;

    // Criar cards
    playlist.forEach((m, i) => {
        grid.innerHTML += `
            <div class="card" onclick="playMusic(${i})">
                <div class="img-box"><img src="${m.img}" onerror="this.src='https://via.placeholder.com/150/111/00d4ff?text=SOUND'"></div>
                <h4>${m.name}</h4>
            </div>
        `;
    });

    function playMusic(i) {
        currentIndex = i;
        const m = playlist[currentIndex];
        audio.src = m.src;
        audio.play();
        document.getElementById("now").innerText = m.name;
        document.getElementById("cover").src = m.img;
        updateUI();
    }

    function toggle() {
        if (!audio.src) return;
        audio.paused ? audio.play() : audio.pause();
        updateUI();
    }

    function updateUI() {
        playBtn.innerHTML = audio.paused ? "▶" : "⏸";
    }

    function next() {
        currentIndex = (currentIndex + 1) % playlist.length;
        playMusic(currentIndex);
    }

    function prev() {
        currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
        playMusic(currentIndex);
    }

    function setVolume(v) { audio.volume = v; }

    audio.addEventListener("timeupdate", () => {
        const prog = document.getElementById("progress");
        prog.value = (audio.currentTime / audio.duration) * 100 || 0;
        document.getElementById("current").innerText = format(audio.currentTime);
        document.getElementById("duration").innerText = isNaN(audio.duration) ? "0:00" : format(audio.duration);
    });

    document.getElementById("progress").addEventListener("input", function() {
        audio.currentTime = (this.value / 100) * audio.duration;
    });

    function format(s) {
        let m = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return m + ":" + (sec < 10 ? "0"+sec : sec);
    }

    audio.addEventListener("play", updateUI);
    audio.addEventListener("pause", updateUI);
    audio.addEventListener("ended", next);
</script>

</body>
</html>
