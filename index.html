<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOᑌᘉᗞ | Ultra Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root { --primary: #00d4ff; --bg-dark: #050a10; --glass: rgba(15, 25, 35, 0.98); --primary-glow: rgba(0, 212, 255, 0.4); }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body, html { width: 100%; height: 100%; background: var(--bg-dark); overflow: hidden; color: white; }

#content-frame { width: 100%; height: 100%; border: none; padding-bottom: 110px; }

.player {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: var(--glass);
  backdrop-filter: blur(30px);
  padding: 15px 30px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 9999;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

.track-info { display: flex; align-items: center; gap: 15px; min-width: 200px; }
#cover { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; background: #111; }

.track-text h3 {
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 150px;
}

.controls { flex: 1; display: flex; flex-direction: column; align-items: center; max-width: 500px; margin: 0 20px; }

.control-btns { display: flex; align-items: center; gap: 25px; margin-bottom: 10px; }

.btn-svg { background: transparent; border: none; cursor: pointer; fill: #fff; display: flex; align-items: center; }

.play-btn-circle {
  width: 50px;
  height: 50px;
  background: #fff;
  border-radius: 50%;
  fill: #000 !important;
  display: flex;
  align-items: center;
  justify-content: center;
}

.progress-area {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  color: #888;
}

.custom-bar {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.fill {
  width: 0%;
  height: 100%;
  background: var(--primary);
}

</style>
</head>

<body>

<!-- 🔒 FIREBASE PROTEÇÃO -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYxvghCciuFie4Z8qG0JsELoqMaZuXcoo",
  authDomain: "soundpremiun-6f32c.firebaseapp.com",
  projectId: "soundpremiun-6f32c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// PROTEÇÃO
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// LOGOUT
window.logout = () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

<!-- BOTÃO SAIR -->
<button onclick="logout()" style="position:fixed;top:20px;right:20px;z-index:99999;">Sair</button>

<!-- CONTEÚDO -->
<iframe src="pagina1.html" id="content-frame" name="main_frame"></iframe>

<!-- PLAYER -->
<div class="player">

<div class="track-info">
<img id="cover" src="https://via.placeholder.com/50/111/00d4ff?text=SOᑌᘉᗞ">
<div class="track-text">
<h3 id="now">Aguardando...</h3>
<p id="status" style="font-size:11px;color:var(--primary);font-weight:600;">READY</p>
</div>
</div>

<div class="controls">
<div class="control-btns">
<button class="btn-svg" onclick="prev()">⏮</button>
<button class="btn-svg play-btn-circle" onclick="toggle()">▶</button>
<button class="btn-svg" onclick="next()">⏭</button>
</div>

<div class="progress-area">
<span id="current">0:00</span>
<div class="custom-bar" onclick="seek(event)">
<div class="fill" id="bar-fill"></div>
</div>
<span id="duration">0:00</span>
</div>
</div>

</div>

<audio id="audio"></audio>

<script>
const playlist = [
{name:"A Promessa", img:"imagens/imagem1.jpg", src:"musicas/musica1.mp3"},
{name:"Se Hoje Me Tocas", img:"imagens/imagem2.jpg", src:"musicas/musica2.mp3"}
];

let currentIndex = 0;
const audio = document.getElementById("audio");

function playMusic(i){
  currentIndex = i;
  audio.src = playlist[i].src;
  audio.play();
  document.getElementById("now").innerText = playlist[i].name;
  document.getElementById("cover").src = playlist[i].img;
}

function toggle(){
  if(!audio.src) return;
  audio.paused ? audio.play() : audio.pause();
}

function next(){
  currentIndex = (currentIndex+1)%playlist.length;
  playMusic(currentIndex);
}

function prev(){
  currentIndex = (currentIndex-1+playlist.length)%playlist.length;
  playMusic(currentIndex);
}

function seek(e){
  const rect = e.currentTarget.getBoundingClientRect();
  const pos = (e.clientX - rect.left)/rect.width;
  audio.currentTime = pos * audio.duration;
}

audio.ontimeupdate = () => {
  const pct = (audio.currentTime / audio.duration) * 100 || 0;
  document.getElementById("bar-fill").style.width = pct + "%";
};
</script>

</body>
</html>
