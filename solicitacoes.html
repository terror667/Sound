<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOᑌᘉᗞ | Solicitar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d4ff; --bg-dark: #050a10; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at bottom right, #0d2b3a, var(--bg-dark)); color: white; display: flex; min-height: 100vh; overflow-x: hidden; }

        .sidebar { width: 260px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); padding: 40px 25px; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; transition: 0.4s; }
        .logo { font-size: 26px; font-weight: 800; margin-bottom: 40px; text-align: center; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links li { list-style: none; padding: 15px; border-radius: 12px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; }
        .nav-links li.active { background: var(--card-bg); color: var(--primary); }

        .main { flex: 1; padding: 40px; padding-bottom: 150px; }
        .search-container { margin-top: 20px; margin-bottom: 40px; max-width: 600px; }
        .search-input { width: 100%; padding: 18px 25px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 16px; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .spotify-card { background: var(--card-bg); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.03); text-align: center; }
        .spotify-card img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .btn-request { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 15px; font-weight: 800; cursor: pointer; width: 100%; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #0a0f14; padding: 40px; border-radius: 30px; border: 1px solid var(--primary); width: 90%; max-width: 450px; text-align: center; }
        .modal-box input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #111; color: white; }

        @media (max-width: 850px) { .sidebar { display: none; } .main { padding: 80px 20px; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">SOᑌᘉᗞ</div>
    <ul class="nav-links">
        <li onclick="location.href='pagina1.html'">🏠 Início</li>
        <li onclick="location.href='pagina2.html'">📂 Biblioteca</li>
        <li class="active">🔍 Solicitar</li>
    </ul>
</aside>

<main class="main">
    <h1>Peça sua música</h1>
    <p style="color: #94a3b8;">Qual música falta aqui? Busque e solicite!</p>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Digite o nome da música..." onkeyup="searchSongs(this.value)">
    </div>

    <div id="results" class="results-grid"></div>
</main>

<div id="modal">
    <div class="modal-box">
        <h3>Quase lá!</h3>
        <p style="color: #666; font-size: 13px; margin-top: 10px;">Informe seu e-mail. Vamos te avisar pessoalmente assim que o som estiver disponível.</p>
        
        <form action="https://formspree.io/f/xojylawj" method="POST">
            <input type="hidden" name="_next" value="sucesso.html">
            <input type="hidden" name="Musica_Solicitada" id="songData">
            
            <input type="email" name="Email_do_Usuario" placeholder="Seu melhor e-mail" required>
            <button type="submit" class="btn-request">Confirmar Solicitação</button>
        </form>
        
        <button onclick="closeModal()" style="background:none; border:none; color: #999; margin-top: 15px; cursor: pointer;">Cancelar</button>
    </div>
</div>

<script>
    function searchSongs(q) {
        if(q.length < 3) return;
        document.getElementById('results').innerHTML = `
            <div class="spotify-card">
                <img src="https://via.placeholder.com/200/111/00d4ff?text=SOᑌᘉᗞ+Previw">
                <h4>${q}</h4>
                <button class="btn-request" onclick="openModal('${q}')">Solicitar</button>
            </div>
        `;
    }
    function openModal(song) {
        document.getElementById('songData').value = song;
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
