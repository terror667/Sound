<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOᑌᘉᗞ | Solicitar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg-dark: #050a10; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at bottom right, #0d2b3a, var(--bg-dark)); 
            color: white; 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* SIDEBAR */
        .sidebar { 
            width: 260px; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); 
            padding: 40px 25px; border-right: 1px solid rgba(255, 255, 255, 0.1); 
            height: 100vh; position: sticky; top: 0; z-index: 100; flex-shrink: 0;
            transition: 0.4s ease;
        }
        .logo { font-size: 26px; font-weight: 800; margin-bottom: 40px; text-align: center; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links li { list-style: none; padding: 15px; border-radius: 12px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; transition: 0.3s; }
        .nav-links li.active { background: var(--card-bg); color: var(--primary); }
        .nav-links li:hover { color: #fff; }

        /* MENU MOBILE */
        .menu-toggle { 
            display: none; position: fixed; top: 15px; left: 15px; z-index: 10001; 
            background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 12px; 
            cursor: pointer; font-size: 20px; color: black; box-shadow: 0 4px 15px rgba(0,212,255,0.3);
        }

        .main { flex: 1; padding: 40px; padding-bottom: 150px; min-height: 100vh; }
        
        .search-input { 
            width: 100%; max-width: 600px; padding: 18px 25px; border-radius: 35px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.1); 
            color: white; outline: none; margin-bottom: 30px; font-size: 16px;
        }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); text-align: center; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card img { width: 100%; border-radius: 15px; margin-bottom: 12px; aspect-ratio: 1/1; object-fit: cover; }
        .card h3 { font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { font-size: 11px; color: #888; margin-bottom: 15px; }

        .btn-play { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; cursor: pointer; width: 100%; margin-bottom: 8px; font-size: 12px; font-weight: 600; }
        .btn-request { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10002; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-box { background: #0a0f14; padding: 35px; border-radius: 30px; border: 1px solid var(--primary); width: 90%; max-width: 400px; text-align: center; }
        .modal-box input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: white; text-align: center; font-size: 16px; }

        @media (max-width: 850px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; left: -260px; }
            .sidebar.open { left: 0; }
            .main { padding: 80px 15px 150px 15px; }
            .results-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>

<button class="menu-toggle" onclick="toggleMenu()">☰</button>

<aside class="sidebar" id="side">
    <div class="logo">SOᑌᘉᗞ</div>
    <ul class="nav-links">
        <li onclick="window.parent.location.href='index.html'">🏠 Início</li>
        <li onclick="location.href='pagina2.html'">📂 Biblioteca</li>
        <li class="active">🔍 Solicitar</li>
    </ul>
</aside>

<main class="main">
    <h1 style="font-weight: 800; margin-bottom: 10px;">Buscar Música</h1>
    <p style="color: #94a3b8; margin-bottom: 25px; font-size: 14px;">Ouça o preview e peça para a <b>SOᑌᘉᗞ</b> adicionar.</p>
    
    <input type="text" id="pesquisa" class="search-input" placeholder="O que você quer ouvir?" oninput="buscar()">
    
    <div id="lista" class="results-grid"></div>
</main>

<div id="modal">
    <div class="modal-box">
        <h2 style="color: var(--primary); font-size: 18px;">Solicitar Música</h2>
        <h3 id="nomeMusica" style="margin-top: 15px; font-size: 15px; color: #eee; font-style: italic;"></h3>
        <input type="email" id="email" placeholder="Seu e-mail para aviso">
        <button id="sendBtn" class="btn-request" onclick="enviar()">Confirmar Pedido</button>
        <button onclick="fechar()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer; font-weight:800; font-size: 12px;">CANCELAR</button>
    </div>
</div>

<script>
// Inicialização correta
(function(){ 
    emailjs.init("Z1mNDpBSBEuhfpaF"); 
})();

let previewAudio = null; // Áudio invisível controlado por script
let musicaAtual = "";
let debounceTimer = null;

function toggleMenu() { document.getElementById('side').classList.toggle('open'); }

async function buscar(){
    const valor = document.getElementById("pesquisa").value;
    const lista = document.getElementById("lista");
    
    if(valor.length < 3) {
        lista.innerHTML = "";
        return;
    }

    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(async () => {
        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(valor)}&media=music&limit=16&entity=song`);
            const data = await res.json();
            lista.innerHTML = "";

            if(data.results.length === 0) {
                lista.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:#444; margin-top: 20px;'>Nenhum resultado encontrado.</p>";
                return;
            }

            data.results.forEach(m => {
                const card = document.createElement("div");
                card.className = "card";
                const cleanName = m.trackName.replace(/'/g, "").replace(/"/g, "");
                const cleanArtist = m.artistName.replace(/'/g, "").replace(/"/g, "");
                const identificador = `${cleanName} - ${cleanArtist}`;

                card.innerHTML = `
                    <img src="${m.artworkUrl100.replace('100x100', '400x400')}" loading="lazy">
                    <h3>${m.trackName}</h3>
                    <p>${m.artistName}</p>
                    <button class="btn-play" onclick="play('${m.previewUrl}')">▶️ OUVIR PREVIEW</button>
                    <button class="btn-request" onclick="abrir('${identificador}')">SOLICITAR</button>
                `;
                lista.appendChild(card);
            });
        } catch (e) { 
            console.error("Erro na busca:", e);
        }
    }, 500); 
}

// Função de áudio sem elementos visuais no HTML
function play(url){
    if(previewAudio) {
        previewAudio.pause();
    }
    previewAudio = new Audio(url);
    previewAudio.play().catch(e => console.log("Erro ao tocar:", e));
}

function abrir(nome){
    musicaAtual = nome;
    document.getElementById("nomeMusica").innerText = nome;
    document.getElementById("modal").style.display = "flex";
}

function fechar(){ document.getElementById("modal").style.display = "none"; }

function enviar(){
    const emailValue = document.getElementById("email").value;
    const btn = document.getElementById("sendBtn");
    
    if(!emailValue.includes("@") || emailValue.length < 5) {
        return alert("Por favor, insira um e-mail válido.");
    }

    btn.innerText = "ENVIANDO...";
    btn.disabled = true;

    // USANDO 'item' PARA EVITAR ACENTOS NO EMAILJS
    const templateParams = {
        item: musicaAtual, 
        email: emailValue
    };

    emailjs.send("service_k5ft1lw", "template_bti0wvb", templateParams)
    .then(() => {
        alert("Pedido enviado com sucesso! 🚀");
        fechar();
        btn.innerText = "Confirmar Pedido";
        btn.disabled = false;
        document.getElementById("email").value = "";
    })
    .catch((err) => {
        alert("Erro no envio. Verifique se mudou para {{item}} no painel.");
        btn.innerText = "Confirmar Pedido";
        btn.disabled = false;
    });
}

document.addEventListener('click', function(e) {
    const sidebar = document.getElementById('side');
    const btn = document.querySelector('.menu-toggle');
    if (window.innerWidth <= 850 && !sidebar.contains(e.target) && !btn.contains(e.target)) {
        sidebar.classList.remove('open');
    }
});
</script>
</body>
</html>
