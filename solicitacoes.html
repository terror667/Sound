<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOᑌᘉᗞ | Solicitar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg-dark: #050a10; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at bottom right, #0d2b3a, var(--bg-dark)); color: white; display: flex; min-height: 100vh; overflow-x: hidden; }
        .menu-toggle { display: none; position: fixed; top: 20px; left: 20px; z-index: 10001; background: transparent; border: none; cursor: pointer; }
        .ham-box { width: 30px; height: 24px; position: relative; }
        .ham-line { width: 100%; height: 3px; background: #fff; position: absolute; transition: 0.4s; border-radius: 3px;}
        .ham-line:nth-child(1) { top: 0; } .ham-line:nth-child(2) { top: 10px; } .ham-line:nth-child(3) { top: 20px; }
        .active .ham-line:nth-child(1) { transform: translateY(10px) rotate(45deg); }
        .active .ham-line:nth-child(2) { opacity: 0; }
        .active .ham-line:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }
        .sidebar { width: 260px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); padding: 40px 25px; border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-links li { list-style: none; padding: 15px; border-radius: 12px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; }
        .nav-links li.active { background: var(--card-bg); color: var(--primary); }
        .main { flex: 1; padding: 40px; padding-bottom: 120px; overflow-y: auto; }
        .search-input { width: 100%; max-width: 600px; padding: 18px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none; margin-bottom: 30px; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-box { background: #0a0f14; padding: 40px; border-radius: 30px; border: 1px solid var(--primary); width: 90%; max-width: 400px; text-align: center; }
        .btn-request { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 15px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
        @media (max-width: 850px) { .menu-toggle { display: block; } .sidebar { position: fixed; left: -260px; height: 100%; z-index: 10000; transition: 0.4s; } .sidebar.open { left: 0; } .main { padding: 80px 20px; } }
    </style>
</head>
<body>
<button class="menu-toggle" onclick="toggleMenu()"><div class="ham-box" id="ham"><div class="ham-line"></div><div class="ham-line"></div><div class="ham-line"></div></div></button>
<aside class="sidebar" id="side">
    <h2 style="text-align:center; margin-bottom:30px;">SOᑌᘉᗞ</h2>
    <ul class="nav-links">
        <li onclick="location.href='pagina1.html'">🏠 Início</li>
        <li onclick="location.href='pagina2.html'">📂 Biblioteca</li>
        <li class="active">🔍 Solicitar</li>
    </ul>
</aside>
<main class="main">
    <h1>Peça seu som</h1>
    <input type="text" class="search-input" placeholder="Buscar música..." onkeyup="searchSongs(this.value)">
    <div id="results" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;"></div>
</main>
<div id="modal">
    <div class="modal-box">
        <h3 id="displaySong"></h3>
        <input type="email" id="userEmail" placeholder="Seu e-mail" style="width:100%; padding:15px; margin:20px 0; border-radius:12px; border:1px solid #333; background:#111; color:white; text-align:center;">
        <button id="sendBtn" class="btn-request" onclick="sendRequest()">Enviar Pedido</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">Cancelar</button>
    </div>
</div>
<script>
    (function(){ emailjs.init("SUA_PUBLIC_KEY"); })();
    let curSong = "";
    function toggleMenu() { document.getElementById('side').classList.toggle('open'); document.getElementById('ham').classList.toggle('active'); }
    function searchSongs(q) { if(q.length < 3) return; document.getElementById('results').innerHTML = `<div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:25px; text-align:center;"><h4>${q}</h4><button class="btn-request" onclick="openModal('${q}')">Solicitar</button></div>`; }
    function openModal(s) { curSong = s; document.getElementById('displaySong').innerText = s; document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function sendRequest() {
        const email = document.getElementById('userEmail').value; const btn = document.getElementById('sendBtn');
        if(!email.includes('@')) return alert("E-mail inválido!");
        btn.innerText = "Enviando..."; btn.disabled = true;
        emailjs.send('SEU_SERVICE_ID', 'SEU_TEMPLATE_ID', { musica: curSong, email: email })
            .then(() => { alert("Pedido enviado!"); location.href = 'pagina1.html'; }, (err) => { alert("Erro!"); btn.innerText = "Tentar novamente"; btn.disabled = false; });
    }
</script>
</body>
</html>
