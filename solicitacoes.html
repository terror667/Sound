<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOᑌᘉᗞ | Solicitar Música</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d4ff; --bg-dark: #050a10; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at bottom right, #0d2b3a, var(--bg-dark)); color: white; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Reaproveitando sua Sidebar */
        .sidebar { width: 260px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); padding: 40px 25px; border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-links li { list-style: none; padding: 15px; border-radius: 12px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; }
        .nav-links li.active { background: var(--card-bg); color: var(--primary); }

        .main { flex: 1; padding: 40px; padding-bottom: 120px; }
        
        /* BUSCA */
        .search-box { width: 100%; max-width: 600px; margin-bottom: 40px; position: relative; }
        .search-box input { width: 100%; padding: 15px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 16px; }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }

        /* RESULTADOS */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .spotify-card { background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); text-align: center; }
        .spotify-card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .btn-request { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 800; cursor: pointer; margin-top: 10px; width: 100%; }

        /* MODAL DE EMAIL */
        #emailModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 20000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 25px; border: 1px solid var(--primary); width: 90%; max-width: 400px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: none; }

        @media (max-width: 850px) { .sidebar { display: none; } .main { padding: 20px; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="text-align:center; margin-bottom:30px; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SOᑌᘉᗞ</h2>
    <ul class="nav-links">
        <li onclick="location.href='pagina1.html'">🏠 Início</li>
        <li onclick="location.href='pagina2.html'">📂 Biblioteca</li>
        <li class="active">🔍 Solicitar Música</li>
    </ul>
</aside>

<main class="main">
    <h1>Buscar no Spotify</h1>
    <p style="color: #94a3b8; margin-bottom: 20px;">Encontre a música que você quer ver no site.</p>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Nome da música ou artista..." onkeyup="searchSpotify(this.value)">
    </div>

    <div id="results" class="results-grid">
        </div>

    <hr style="opacity: 0.1; margin: 40px 0;">

    <h1>Minha Área de Desejo</h1>
    <div id="wishlist" class="results-grid">
        </div>
</main>

<div id="emailModal">
    <div class="modal-content">
        <h3>Quase lá!</h3>
        <p style="font-size: 13px; color: #888;">Informe seu e-mail para receber o aviso quando a música for adicionada.</p>
        <form id="requestForm">
            <input type="email" id="userEmail" placeholder="seu@email.com" required>
            <input type="hidden" id="songName">
            <button type="submit" class="btn-request">Enviar Solicitação</button>
        </form>
        <button onclick="closeModal()" style="background:none; border:none; color:white; margin-top:10px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
    // OBS: Para a busca real, você precisaria de um Token do Spotify. 
    // Vou simular a função de busca para você ver o visual e a lógica.

    function searchSpotify(query) {
        if(query.length < 3) return;
        const results = document.getElementById('results');
        
        // Simulação de resultado da API
        results.innerHTML = `
            <div class="spotify-card">
                <img src="https://via.placeholder.com/150/222/00d4ff?text=Spotify+Cover">
                <h4>${query}...</h4>
                <p style="font-size:12px; color:var(--primary)">Preview 30s</p>
                <button class="btn-request" onclick="openModal('${query}')">Solicitar</button>
            </div>
        `;
    }

    function openModal(song) {
        document.getElementById('songName').value = song;
        document.getElementById('emailModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('emailModal').style.display = 'none';
    }

    document.getElementById('requestForm').onsubmit = function(e) {
        e.preventDefault();
        const email = document.getElementById('userEmail').value;
        const song = document.getElementById('songName').value;

        // Aqui você integraria com Formspree ou EmailJS
        alert(`Sucesso! Enviamos um e-mail para ${email}. Assim que "${song}" estiver no site, você será avisado!`);
        
        // Salva na Área de Desejo Local
        addToWishlist(song);
        closeModal();
    };

    function addToWishlist(song) {
        const wish = document.getElementById('wishlist');
        wish.innerHTML += `
            <div class="spotify-card" style="opacity: 0.7">
                <img src="https://via.placeholder.com/150/111/444?text=Pendente">
                <h4>${song}</h4>
                <span style="color: #ffcc00; font-size: 11px;">Aguardando Aprovação</span>
            </div>
        `;
    }
</script>

</body>
</html>
