<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOᑌᘉᗞ | Solicitar</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body {
  background: #050a10;
  color: white;
  font-family: Arial;
  text-align: center;
}

input {
  padding: 12px;
  width: 300px;
  margin: 20px;
  border-radius: 10px;
  border: none;
}

.card {
  background: #111;
  padding: 20px;
  margin: 10px auto;
  width: 250px;
  border-radius: 15px;
}

button {
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #00d4ff;
  cursor: pointer;
  width: 100%;
}
</style>
</head>

<body>

<h1>Buscar Música</h1>

<input type="text" id="pesquisa" placeholder="Digite qualquer música..." onkeyup="buscar()">

<div id="lista"></div>

<!-- MODAL -->
<div id="modal" style="display:none;">
  <h3 id="nomeMusica"></h3>
  <input type="email" id="email" placeholder="seu@email.com">
  <button onclick="enviar()">Enviar Pedido</button>
  <button onclick="fechar()">Cancelar</button>
</div>

<script>
(function(){ emailjs.init("Z1mNDpBSBEuhfpaF"); })();

let audio = null;
let musicaAtual = "";

// 🔍 BUSCA QUALQUER MÚSICA (DEEZER)
async function buscar(){
  const valor = document.getElementById("pesquisa").value;

  if(valor.length < 2) return;

  const lista = document.getElementById("lista");
  lista.innerHTML = "Carregando...";

  const res = await fetch(`https://api.deezer.com/search?q=${valor}`);
  const data = await res.json();

  lista.innerHTML = "";

  data.data.slice(0,10).forEach(m => {

    lista.innerHTML += `
      <div class="card">
        <img src="${m.album.cover_medium}" width="100%">
        <h3>${m.title}</h3>
        <p>${m.artist.name}</p>

        <button onclick="play('${m.preview}')">▶️ Ouvir 30s</button>
        <button onclick="abrir('${m.title} - ${m.artist.name}')">Solicitar</button>
      </div>
    `;
  });
}

// ▶️ PREVIEW REAL (30s)
function play(url){
  if(audio) audio.pause();

  audio = new Audio(url);
  audio.play();
}

// 📩 MODAL
function abrir(nome){
  musicaAtual = nome;
  document.getElementById("nomeMusica").innerText = nome;
  document.getElementById("modal").style.display = "block";
}

function fechar(){
  document.getElementById("modal").style.display = "none";
}

// 📧 EMAIL
function enviar(){
  const email = document.getElementById("email").value;

  if(!email.includes("@")){
    alert("Email inválido");
    return;
  }

  emailjs.send("service_k5ft1lw","template_bti0wvb",{
    musica: musicaAtual,
    email: email
  }).then(() => {
    alert("Pedido enviado 🚀");
  });
}
</script>

</body>
</html>
