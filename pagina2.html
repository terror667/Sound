<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #00d4ff; --bg-dark: #050a10; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at bottom left, #0d2b3a, var(--bg-dark)); color: white; display: flex; overflow-x: hidden; height: 100vh; }
        .sidebar { width: 260px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); padding: 40px 25px; border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-links li { list-style: none; padding: 15px; border-radius: 12px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; }
        .nav-links li.active { background: var(--card-bg); color: var(--primary); }
        .main { flex: 1; padding: 40px; padding-bottom: 120px; overflow-y: auto; }
        .playlist-card { background: var(--card-bg); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .icon-box { width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary), #0055ff); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>
<aside class="sidebar">
    <h2 style="text-align:center; margin-bottom:30px; color:var(--primary);">SOᑌᘉᗞ</h2>
    <ul class="nav-links">
        <li onclick="location.href='pagina1.html'">🏠 Início</li>
        <li class="active" onclick="location.href='pagina2.html'">📂 Biblioteca</li>
        <li onclick="location.href='solicitacoes.html'">🔍 Solicitar</li>
    </ul>
</aside>
<main class="main">
    <h1>Sua Biblioteca</h1>
    <div class="playlist-card"><div class="icon-box">🎧</div><div><h4>Mix Diário</h4><span>Para você</span></div></div>
    <div class="playlist-card"><div class="icon-box">✨</div><div><h4>Favoritos</h4><span>Músicas curtidas</span></div></div>
</main>
</body>
</html>
