<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --primary: #00d4ff; --bg-dark: #050a10; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at bottom left, #0d2b3a, var(--bg-dark)); color: white; display: flex; overflow-x: hidden; height: 100vh; }

        .menu-toggle { display: none; position: fixed; top: 20px; left: 20px; z-index: 10001; background: transparent; border: none; cursor: pointer; }
        .ham-box { width: 30px; height: 24px; position: relative; }
        .ham-line { width: 100%; height: 3px; background: #fff; position: absolute; transition: 0.4s; border-radius: 3px;}
        .ham-line:nth-child(1) { top: 0; }
        .ham-line:nth-child(2) { top: 10px; }
        .ham-line:nth-child(3) { top: 20px; }
        .active .ham-line:nth-child(1) { transform: translateY(10px) rotate(45deg); }
        .active .ham-line:nth-child(2) { opacity: 0; }
        .active .ham-line:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

        .sidebar { width: 260px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); padding: 40px 25px; transition: 0.4s; border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-links li { list-style: none; padding: 15px; border-radius: 12px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; }
        .nav-links li.active { background: var(--card-bg); color: var(--primary); }

        .main { flex: 1; padding: 40px; }
        .playlist-card { background: var(--card-bg); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .icon-box { width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary), #0055ff); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        @media (max-width: 850px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; left: -260px; height: 100%; z-index: 10000; }
            .sidebar.open { left: 0; }
            .main { padding: 80px 20px; }
        }
    </style>
</head>
<body>

<button class="menu-toggle" onclick="toggleMenu()">
    <div class="ham-box" id="ham">
        <div class="ham-line"></div><div class="ham-line"></div><div class="ham-line"></div>
    </div>
</button>

<aside class="sidebar" id="side">
    <h2 style="text-align:center; margin-bottom:30px;">SOᑌᘉᗞ 🎧</h2>
    <ul class="nav-links">
        <li onclick="location.href='pagina1.html'">🏠 Início</li>
        <li class="active" onclick="location.href='pagina2.html'">📂 Biblioteca</li>
    </ul>
</aside>

<main class="main">
    <h1 style="margin-bottom:10px;">Biblioteca</h1>
    <p style="color:#94a3b8; margin-bottom:30px;">Suas coleções salvas.</p>
    
    <div class="playlist-card"><div class="icon-box">🎧</div><div><h4>Mix Diário</h4><span style="font-size:12px; color:#64748b;">Especial para você</span></div></div>
    <div class="playlist-card"><div class="icon-box">✨</div><div><h4>Favoritos</h4><span style="font-size:12px; color:#64748b;">O que você amou</span></div></div>
</main>

<script>
    function toggleMenu() {
        document.getElementById('side').classList.toggle('open');
        document.getElementById('ham').classList.toggle('active');
    }
</script>
</body>
</html>
