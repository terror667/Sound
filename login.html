<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundPremiun - Entrar</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1DB954; /* Spotify green */
            --secondary-color: #191414; /* Dark black */
            --text-light: #FFFFFF;
            --text-dark: #B3B3B3;
            --input-bg: #282828;
            --input-border: #404040;
            --button-hover: #1ED760;
            --bg-gradient-start: #121212;
            --bg-gradient-end: #000000;
            --error-color: #FF4D4D;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-light);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .login-container {
            background-color: var(--secondary-color);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 1;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #FF6F00, #FFD54F, #1DB954, #4CAF50, #2196F3);
            background-size: 400% 400%;
            animation: gradientBorder 15s ease infinite;
            z-index: -1;
            border-radius: 22px;
            filter: blur(8px);
            opacity: 0.3;
        }

        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container .logo {
            margin-bottom: 30px;
        }

        .login-container .logo img {
            height: 60px;
            margin-bottom: 10px;
        }

        .login-container .logo h2 {
            font-size: 2.2em;
            color: var(--primary-color);
            font-weight: 700;
            margin: 0;
        }

        .login-container h3 {
            font-size: 1.8em;
            color: var(--text-light);
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 0.95em;
            font-weight: 600;
        }

        .form-group input {
            width: calc(100% - 24px); /* Account for padding */
            padding: 14px 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1em;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.3);
            outline: none;
        }

        .form-group input::placeholder {
            color: var(--text-dark);
            opacity: 0.7;
        }

        .login-button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: var(--text-light);
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            margin-top: 20px;
        }

        .login-button:hover {
            background-color: var(--button-hover);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .links-section {
            margin-top: 30px;
            font-size: 0.95em;
        }

        .links-section a {
            color: var(--primary-color);
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        .links-section a:hover {
            color: var(--button-hover);
            text-decoration: underline;
        }

        .error-message {
            color: var(--error-color);
            margin-top: 15px;
            font-size: 0.9em;
            font-weight: 600;
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="logo.png" alt="SoundPremiun Logo">
            <h2>SoundPremiun</h2>
        </div>
        <h3>Faça login para continuar</h3>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="login-button">Entrar</button>
            <p class="error-message" id="errorMessage"></p>
        </form>
        <div class="links-section">
            <a href="register.html">Não tem uma conta? Registre-se</a>
            <a href="#">Esqueceu a senha?</a>
        </div>
    </div>

    <!-- Firebase SDK - Adicionado com base na sua informação -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCYxvghCciuFie4Z8qG0JsELoqMaZuXcoo",
            authDomain: "soundpremiun-6f32c.firebaseapp.com",
            projectId: "soundpremiun-6f32c",
            storageBucket: "soundpremiun-6f32c.firebasestorage.app",
            messagingSenderId: "627077390996",
            appId: "1:627077390996:web:4daa434fbeddfe10f60a81"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Get form elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');

        // Handle login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent default form submission

            const email = emailInput.value;
            const password = passwordInput.value;

            errorMessage.style.display = 'none'; // Hide any previous error messages

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                console.log('User logged in:', user);
                // Redirect to a protected page, e.g., 'pagina1.html' or user dashboard
                window.location.href = 'pagina1.html'; // Or your desired redirect page
            } catch (error) {
                console.error('Login error:', error.code, error.message);
                let message = 'Erro ao fazer login. Verifique suas credenciais.';
                switch (error.code) {
                    case 'auth/user-not-found':
                    case 'auth/wrong-password':
                        message = 'Email ou senha inválidos.';
                        break;
                    case 'auth/invalid-email':
                        message = 'O formato do email é inválido.';
                        break;
                    case 'auth/too-many-requests':
                        message = 'Muitas tentativas de login. Tente novamente mais tarde.';
                        break;
                    default:
                        message = 'Ocorreu um erro inesperado. Tente novamente.';
                }
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
