<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar - SOᑌᘉᗞ</title>

<style>
body {
  background: linear-gradient(135deg, #050a10, #0a1a25);
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.box {
  background: rgba(15,25,35,0.95);
  padding: 40px;
  border-radius: 25px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,212,255,0.2);
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  background: #0f1f2a;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.login { background: #00d4ff; color: black; }
.google { background: white; color: black; }

.link {
  margin-top: 15px;
  display: block;
  color: #00d4ff;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>SOᑌᘉᗞ</h2>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button class="login" onclick="login()">Entrar</button>
  <button class="google" onclick="loginGoogle()">Entrar com Google</button>

  <span class="link" onclick="goRegister()">Criar conta</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYxvghCciuFie4Z8qG0JsELoqMaZuXcoo",
  authDomain: "soundpremiun-6f32c.firebaseapp.com",
  projectId: "soundpremiun-6f32c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// EMAIL LOGIN
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, senha.value)
    .then(() => window.location.href = "index.html")
    .catch(e => alert(e.message));
};

// GOOGLE LOGIN
const provider = new GoogleAuthProvider();

window.loginGoogle = () => {
  signInWithPopup(auth, provider)
    .then(() => window.location.href = "index.html")
    .catch(e => alert(e.message));
};

window.goRegister = () => {
  window.location.href = "register.html";
};
</script>

</body>
</html>
